name: CD Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/carsensor-auth:latest,${{ secrets.DOCKER_USERNAME }}/carsensor-auth:${{ github.ref_name }}

      - name: Build and push Car Service
        uses: docker/build-push-action@v5
        with:
          context: ./car-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/carsensor-car:latest,${{ secrets.DOCKER_USERNAME }}/carsensor-car:${{ github.ref_name }}