stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true"
  # Добавляем переменные для Docker-in-Docker
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

cache:
  paths:
    - .m2/repository/
  key: "$CI_COMMIT_REF_SLUG"

# Убираем before_script с установкой docker.io
before_script:
  - java -version
  - mvn --version
  # Docker будет доступен через сервис, проверяем его доступность
  - timeout 10s sh -c "until docker info; do sleep 1; done"

build:
  stage: build
  # Добавляем сервис Docker-in-Docker
  services:
    - name: docker:dind
      alias: docker
  script:
    - mvn $MAVEN_CLI_OPTS compile
  artifacts:
    paths:
      - target/
      - ./*/target/
      - ./**/target/
    expire_in: 1 hour
  tags:
    - docker

test:
  stage: test
  # Добавляем сервис Docker-in-Docker
  services:
    - name: docker:dind
      alias: docker
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    reports:
      junit:
        - '**/target/surefire-reports/TEST-*.xml'
    paths:
      - '**/target/surefire-reports/'
    expire_in: 1 week
  tags:
    - docker