stages:
  - build
  - unit-test
  - integration-test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: test
  REDIS_PASSWORD: ""

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/
    - frontend/node_modules/
  policy: pull-push

# Шаблон для этапов, где нужен Docker
.docker-setup: &docker-setup
  image: docker:29.3-git
  services:
    - docker:dind
  before_script:
    - until docker info; do sleep 1; done

build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21-alpine
  script:
    - mvn $MAVEN_CLI_OPTS compile
  artifacts:
    paths:
      - services/*/target/
    expire_in: 1 hour

unit-test:
  stage: unit-test
  image: maven:3.9.9-eclipse-temurin-21-alpine
  variables:
    TESTCONTAINERS_HOST_OVERRIDE: docker
  script:
    - mvn $MAVEN_CLI_OPTS test -Dtest=*Test -DfailIfNoTests=false
  artifacts:
    reports:
      junit:
        - '**/target/surefire-reports/TEST-*.xml'
    paths:
      - '**/target/surefire-reports/'
    expire_in: 1 week

integration-test:
  stage: integration-test
  image: maven:3.9.9-eclipse-temurin-21-alpine
  services:
    - name: docker:dind
      alias: docker
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7.2-alpine
      alias: redis
  variables:
    TESTCONTAINERS_HOST_OVERRIDE: docker
    SPRING_DATASOURCE_URL: jdbc:tc:postgresql:16-alpine:///testdb
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  before_script:
    - apk add --no-cache docker-cli
    - until docker info; do sleep 1; done
  script:
    - mvn $MAVEN_CLI_OPTS verify -DskipUnitTests=true -Dtest=*IntegrationTest
  artifacts:
    reports:
      junit:
        - '**/target/failsafe-reports/TEST-*.xml'
        - '**/target/surefire-reports/TEST-*IntegrationTest.xml'
    paths:
      - '**/target/site/jacoco/'
      - '**/target/failsafe-reports/'
    expire_in: 1 week
  needs:
    - unit-test

package:
  stage: package
  image: docker:29.3-git
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Сборка образов
    - docker build -t $CI_REGISTRY_IMAGE/auth-service:latest -f services/auth-service/Dockerfile .
    - docker build -t $CI_REGISTRY_IMAGE/car-service:latest -f services/car-service/Dockerfile .
    - docker build -t $CI_REGISTRY_IMAGE/scheduler-service:latest -f services/scheduler-service/Dockerfile .
    - docker build -t $CI_REGISTRY_IMAGE/gateway-service:latest -f services/gateway-service/Dockerfile .
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest -f frontend/Dockerfile frontend

    # Публикация образов
    - docker push $CI_REGISTRY_IMAGE/auth-service:latest
    - docker push $CI_REGISTRY_IMAGE/car-service:latest
    - docker push $CI_REGISTRY_IMAGE/scheduler-service:latest
    - docker push $CI_REGISTRY_IMAGE/gateway-service:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main
  needs:
    - integration-test