stages:
  - build
  - unit-test
  - integration-test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: test
  REDIS_PASSWORD: ""

timeout: 2h

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/
    - frontend/node_modules/
    - common/*/target/
    - services/*/target/
  policy: pull-push

build:
  stage: build
  tags: [local, shell, wsl]
  before_script:
    - chmod +x ./mvnw
  script:
    - ./mvnw $MAVEN_CLI_OPTS compile
  artifacts:
    paths:
      - services/*/target/
      - common/*/target/
    expire_in: 1 hour

unit-test:
  stage: unit-test
  tags: [local, shell, wsl]
  before_script:
    - chmod +x ./mvnw
  script:
    - ./mvnw $MAVEN_CLI_OPTS test -Dmaven.test.failure.ignore=true -Dsurefire.failIfNoSpecifiedTests=false
  artifacts:
    when: always
    reports:
      junit:
        - '**/target/surefire-reports/TEST-*.xml'
    paths:
      - '**/target/surefire-reports/'
    expire_in: 1 week

integration-test:
  stage: integration-test
  tags: [local, shell, wsl]
  before_script:
    - chmod +x ./mvnw
    - echo "Checking Docker..."
    - docker --version || echo "Docker not found"
  variables:
    TESTCONTAINERS_HOST_OVERRIDE: localhost
    SPRING_DATASOURCE_URL: jdbc:tc:postgresql:16-alpine:///testdb
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - ./mvnw $MAVEN_CLI_OPTS verify -DskipUnitTests=true -Dmaven.test.failure.ignore=true
  artifacts:
    when: always
    reports:
      junit:
        - '**/target/failsafe-reports/TEST-*.xml'
        - '**/target/surefire-reports/TEST-*IntegrationTest.xml'
    paths:
      - '**/target/site/jacoco/'
      - '**/target/failsafe-reports/'
    expire_in: 1 week
  needs:
    - unit-test

package:
  stage: package
  tags: [local, shell, wsl]
  before_script:
    - echo "Checking Docker..."
    - docker --version || echo "Docker not found"
  script:
    - docker build -t $CI_REGISTRY_IMAGE/auth-service:latest -f services/auth-service/Dockerfile . &
    - docker build -t $CI_REGISTRY_IMAGE/car-service:latest -f services/car-service/Dockerfile . &
    - docker build -t $CI_REGISTRY_IMAGE/scheduler-service:latest -f services/scheduler-service/Dockerfile . &
    - docker build -t $CI_REGISTRY_IMAGE/gateway-service:latest -f services/gateway-service/Dockerfile . &
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest -f frontend/Dockerfile frontend &
    - wait
    - docker push $CI_REGISTRY_IMAGE/auth-service:latest &
    - docker push $CI_REGISTRY_IMAGE/car-service:latest &
    - docker push $CI_REGISTRY_IMAGE/scheduler-service:latest &
    - docker push $CI_REGISTRY_IMAGE/gateway-service:latest &
    - docker push $CI_REGISTRY_IMAGE/frontend:latest &
    - wait
  only:
    - main
  needs:
    - integration-test
    