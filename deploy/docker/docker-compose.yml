networks:
  carsensor-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-auth-data:
  postgres-car-data:
  postgres-scheduler-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: carsensor-postgres-auth
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${AUTH_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsensor-network
    restart: unless-stopped

  postgres-car:
    image: postgres:16-alpine
    container_name: carsensor-postgres-car
    environment:
      POSTGRES_DB: ${CAR_DB_NAME:-car_db}
      POSTGRES_USER: ${CAR_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${CAR_DB_PASSWORD:-postgres}
    ports:
      - "${CAR_DB_PORT:-5434}:5432"
    volumes:
      - postgres-car-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${CAR_DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsensor-network
    restart: unless-stopped

  postgres-scheduler:
    image: postgres:16-alpine
    container_name: carsensor-postgres-scheduler
    environment:
      POSTGRES_DB: ${SCHEDULER_DB_NAME:-scheduler_db}
      POSTGRES_USER: ${SCHEDULER_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SCHEDULER_DB_PASSWORD:-postgres}
    ports:
      - "${SCHEDULER_DB_PORT:-5435}:5432"
    volumes:
      - postgres-scheduler-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SCHEDULER_DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsensor-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: carsensor-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsensor-network
    restart: unless-stopped

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    container_name: carsensor-auth
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${AUTH_DB_USERNAME:-postgres}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carsensor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  car-service:
    build:
      context: ../..
      dockerfile: services/car-service/Dockerfile
    container_name: carsensor-car
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${CAR_DB_USERNAME:-postgres}
      DB_PASSWORD: ${CAR_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      postgres-car:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carsensor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler-service:
    build:
      context: ../..
      dockerfile: services/scheduler-service/Dockerfile
    container_name: carsensor-scheduler
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CAR_SERVICE_URL: http://car-service:8082
      PARSER_MAX_PAGES: ${PARSER_MAX_PAGES:-5}
      DB_USERNAME: ${SCHEDULER_DB_USERNAME:-postgres}
      DB_PASSWORD: ${SCHEDULER_DB_PASSWORD:-postgres}
    ports:
      - "8083:8083"
    depends_on:
      postgres-scheduler:
        condition: service_healthy
      car-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carsensor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway-service:
    build:
      context: ../..
      dockerfile: services/gateway-service/Dockerfile
    container_name: carsensor-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      car-service:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
    networks:
      - carsensor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: carsensor-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      gateway-service:
        condition: service_healthy
    networks:
      - carsensor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: carsensor-prometheus
    volumes:
      - ../../deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - carsensor-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: carsensor-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ../../deploy/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../../deploy/monitoring/grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    depends_on:
      - prometheus
    networks:
      - carsensor-network
    restart: unless-stopped
    profiles:
      - monitoring