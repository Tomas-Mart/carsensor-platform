openapi: 3.0.0
info:
  title: CarSensor Platform API
  description: API для платформы парсинга автомобилей CarSensor
  version: 1.0.0
  contact:
    name: Support Team
    email: support@carsensor.local

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.carsensor.local/v1
    description: Production server

tags:
  - name: Authentication
    description: Операции аутентификации
  - name: Cars
    description: Операции с автомобилями

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Car:
      type: object
      properties:
        id:
          type: integer
          example: 1
        brand:
          type: string
          example: "Toyota"
        model:
          type: string
          example: "Camry"
        year:
          type: integer
          example: 2020
        mileage:
          type: integer
          example: 50000
        price:
          type: number
          format: double
          example: 2500000

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "admin"
        password:
          type: string
          format: password
          example: "admin123"

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
        username:
          type: string

security:
  - bearerAuth: [ ]

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные учетные данные

  /cars:
    get:
      tags:
        - Cars
      summary: Получение списка автомобилей
      parameters:
        - name: brand
          in: query
          schema:
            type: string
        - name: yearFrom
          in: query
          schema:
            type: integer
        - name: yearTo
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
                  total_elements:
                    type: integer
                  total_pages:
                    type: integer