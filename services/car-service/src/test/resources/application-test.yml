spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

app:
  jwt:
    secret: mySecretKeyForJWTTokenGenerationThatMustBeAtLeast512BitsLongInProductionEnvironment2026
    access-token-expiration: 900
    refresh-token-expiration: 604800

logging:
  level:
    com.carsensor: DEBUG
    org.hibernate.SQL: DEBUG
    org.testcontainers: INFO