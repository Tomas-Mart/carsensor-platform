spring:
  config:
    activate:
      on-profile: dev

  cloud:
    gateway:
      enabled: true
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
            allowCredentials: true
            maxAge: 3600

  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json

server:
  port: 8080

services:
  auth:
    url: http://localhost:8081
  car:
    url: http://localhost:8082

app:
  jwt:
    secret: mySuperSecretKeyForJWTTokenGenerationThatMustBeAtLeast512BitsLongInProductionEnvironment2026
    access-token-expiration: 900
    refresh-token-expiration: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      gateway: true
    tags:
      application: gateway-service

logging:
  level:
    com.carsensor.gateway: DEBUG
    org.springframework.cloud.gateway: INFO