spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:https://*.railway.app,https://*.up.railway.app}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
        - id: car-service
          uri: ${CAR_SERVICE_URL:http://car-service:8082}
          predicates:
            - Path=/api/cars/**
        - id: scheduler-service
          uri: ${SCHEDULER_SERVICE_URL:http://scheduler-service:8083}
          predicates:
            - Path=/api/scheduler/**

server:
  port: '${PORT:8080}'

app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationThatMustBeAtLeast512BitsLongInProductionEnvironment2026}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  car:
    url: ${CAR_SERVICE_URL:http://car-service:8082}
  scheduler:
    url: ${SCHEDULER_SERVICE_URL:http://scheduler-service:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
prometheus:
  metrics:
    export:
      enabled: true

logging:
  level:
    com.carsensor.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: /var/log/gateway-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 1GB
      clean-history-on-start: false
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"
---
spring:
  config:
    activate:
      on-profile: production
  main:
    web-application-type: reactive
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:https://*.railway.app,https://*.up.railway.app,https://yourdomain.com}

logging:
  level:
    com.carsensor.gateway: WARN
    org.springframework.cloud.gateway: WARN