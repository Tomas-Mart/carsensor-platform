spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive

server:
  port: 8080

logging:
  level:
    com.carsensor.gateway: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${services.auth.url:https://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: car-service
          uri: ${services.car.url:https://car-service:8082}
          predicates:
            - Path=/api/v1/cars/**
        - id: auth-actuator
          uri: ${services.auth.url:https://auth-service:8081}
          predicates:
            - Path=/actuator/auth/**
          filters:
            - RewritePath=/actuator/auth/(?<segment>.*), /actuator/${segment}
        - id: car-actuator
          uri: ${services.car.url:https://car-service:8082}
          predicates:
            - Path=/actuator/car/**
          filters:
            - RewritePath=/actuator/car/(?<segment>.*), /actuator/${segment}
        - id: auth-swagger
          uri: ${services.auth.url:https://auth-service:8081}
          predicates:
            - Path=/swagger/auth/**
          filters:
            - RewritePath=/swagger/auth/(?<segment>.*), /swagger-ui/${segment}
        - id: car-swagger
          uri: ${services.car.url:https://car-service:8082}
          predicates:
            - Path=/swagger/car/**
          filters:
            - RewritePath=/swagger/car/(?<segment>.*), /swagger-ui/${segment}

services:
  auth:
    url: http://auth-service:8081
  car:
    url: http://car-service:8082

---
spring:
  config:
    activate:
      on-profile: test
  cloud:
    gateway:
      enabled: true
  main:
    web-application-type: reactive

services:
  auth:
    url: http://localhost:8081
  car:
    url: http://localhost:8082

app:
  jwt:
    secret: mySuperSecretKeyForJWTTokenGenerationThatMustBeAtLeast512BitsLongInProductionEnvironment2026
    access-token-expiration: 900
    refresh-token-expiration: 604800

logging:
  level:
    com.carsensor.gateway: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      authService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      carService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      schedulerService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50