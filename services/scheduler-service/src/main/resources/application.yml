spring:
  application:
    name: scheduler-service
  profiles:
    active: dev

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idleTimeout: 600000
      maxLifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: scheduler-service
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 20000
            misfireThreshold: 60000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 5
            threadPriority: 5

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterAccess=600s

server:
  port: 8083

app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationThatMustBeAtLeast512BitsLongInProductionEnvironment2026}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

car-service:
  url: ${CAR_SERVICE_URL:http://localhost:8082}

parser:
  max-pages: ${PARSER_MAX_PAGES:5}
  user-agent: ${PARSER_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36}
  timeout: ${PARSER_TIMEOUT:30000}
  schedule: ${PARSER_SCHEDULE:0 0 * * * *}

resilience4j:
  circuitbreaker:
    instances:
      carParser:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.lang.Exception
  retry:
    instances:
      carParser:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
  timelimiter:
    instances:
      carParser:
        timeout-duration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.carsensor.scheduler: DEBUG
    org.springframework.security: INFO
    org.springframework.cache: INFO
    org.quartz: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-scheduler:5432/scheduler_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

car-service:
  url: ${CAR_SERVICE_URL:http://car-service:8082}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      validation-timeout: 5000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false
  quartz:
    job-store-type: memory

car-service:
  url: http://localhost:8082

app:
  jwt:
    secret: testSecretKeyForUnitTestsThatMustBeAtLeast512BitsLongForProperTesting2026
    access-token-expiration: 900
    refresh-token-expiration: 604800