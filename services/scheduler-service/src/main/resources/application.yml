server:
  port: 8083

spring:
  application:
    name: scheduler-service

parser:
  max-pages: 5
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  timeout: 30000

car-service:
  url: ${CAR_SERVICE_URL:http://localhost:8082}

resilience4j:
  circuitbreaker:
    instances:
      carParser:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      carParser:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
  timelimiter:
    instances:
      carParser:
        timeout-duration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.carsensor.scheduler: DEBUG
    org.springframework.web.client: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker

car-service:
  url: ${CAR_SERVICE_URL:http://car-service:8082}